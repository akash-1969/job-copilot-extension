<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobCopilot Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">JC</div>
        <h2>JobCopilot</h2>
      </div>
    </header>

    <div class="content">
      <div id="status-card" class="status-card loading">
        <div class="status-icon-container">
          <svg id="status-icon" class="status-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="status-info">
          <h3 id="status-title">Checking status...</h3>
          <p id="status-desc">Reading local profile data.</p>
        </div>
      </div>

      <div class="action-buttons">
        <button id="open-dashboard-btn" class="btn btn-primary">Open Profile Dashboard</button>
      </div>
    </div>

    <footer class="footer">
      <span>JobCopilot MVP</span>
      <span class="secure-badge">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
        </svg>
        Local Storage
      </span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
